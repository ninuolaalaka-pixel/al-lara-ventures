<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Successful | AL LARA VENTURES UAE</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      background: #fff8ec;
      color: #2e7d32;
    }

    .success-hero {
      padding: 80px 20px;
      text-align: center;
    }

    .success-hero h1 {
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #2e7d32;
    }

    .success-hero p {
      font-size: 16px;
      color: #4b6b4f;
      margin-bottom: 30px;
    }

    .success-card {
      background: #ffffff;
      max-width: 700px;
      margin: 0 auto;
      padding: 30px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
      text-align: center;
    }

    .success-card h2 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #2e7d32;
    }

    .success-buttons {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .success-buttons a {
      padding: 12px 24px;
      background: #2e7d32;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: 0.3s;
    }

    .success-buttons a:hover {
      background: #256628;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="container">
      <nav style="display:flex; justify-content:space-between; align-items:center; padding:20px 0;">

        <div style="display:flex; align-items:center; gap:10px;">
          <a href="index.html">
            <img src="images/Service Business Logo AL LARA VENTURES.png" alt="AL LARA VENTURES Logo" style="height:40px;">
          </a>
          <strong style="color:#2e7d32; font-size:22px; font-weight:800;">
            <a href="index.html" class="logo-link">AL LARA VENTURES</a>
          </strong>
        </div>

        <div style="display:flex; gap:20px; align-items:center;">
          <a href="index.html" class="nav-link">Home</a>
          <a href="uae-store.html" class="nav-link">Foodstuff (UAE)</a>
          <a href="cleaning.html" class="nav-link">Cleaning</a>
          <a href="coming-soon.html" class="nav-link">Nigeria Store</a>
          <a href="index.html#about" class="nav-link">About</a>
          <a href="index.html#contact" class="nav-link">Contact</a>
          <a href="cart.html" class="cart-link">🛒 <span id="cart-count">0</span></a>
        </div>

      </nav>
    </div>
  </header>

  <!-- SUCCESS CONTENT -->
  <section class="success-hero">
    <h1>Payment Successful</h1>
    <p>Thank you for your purchase. Your order has been received.</p>

    <div class="success-card">
      <h2>Your order has been confirmed</h2>
      <p>We will contact you shortly with delivery details.</p>

      <div class="success-buttons">
        <a href="index.html">Return Home</a>
        <a href="uae-store.html">Continue Shopping</a>
      </div>
    </div>
  </section>

 <script>
  document.addEventListener("DOMContentLoaded", async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');
    const paymentGateway = urlParams.get('pg');
    const statusText = document.querySelector('.success-card p');

    // --- 1. TAMARA SPECIFIC LOGIC ---
    // Inside your Tamara if-statement in success.html:

if (paymentGateway === 'tamara' && orderId) {
  // 1. Initial message while the server "handshakes" with Tamara
  statusText.innerHTML = "Just a moment... we're finalizing your order details.";
  
  try {
    const response = await fetch("/api/tamara-capture", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ orderId: orderId })
    });

    const data = await response.json();

    if (data.success) {
      // 2. Success message
      statusText.innerHTML = "Everything looks great! Your order is confirmed and we're getting it ready for delivery.";
      clearOrderSession();
    } else {
      // 3. Fallback (reassuring them it's being handled manually)
      statusText.innerHTML = "Your order has been received. Our team will verify the payment and contact you shortly.";
      clearOrderSession(); // We still clear the cart because they did complete the Tamara checkout
    }
  } catch (err) {
    // 4. Network error message
    statusText.innerHTML = "Order received! If you don't receive a confirmation email soon, please reach out to our support team.";
  }
}
    
    // --- 2. ZIINA & TABBY & OTHERS ---
    else {
      // Your existing working logic for the other gateways
      clearOrderSession();
    }

    // Helper to keep code clean
    function clearOrderSession() {
      localStorage.removeItem("cart");
      localStorage.removeItem("registered_since");
      const cartCount = document.getElementById("cart-count");
      if (cartCount) cartCount.textContent = "0";
    }
  });
</script>


</body>
</html>
